; PlatformIO Project Configuration File
; ESP12F (ESP8266) + Esp8266Base library

[env:esp12f]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; Esp8266Base library (symlink for development)
lib_deps =
    symlink:///Users/tyg/dir/claude_dir/Esp8266Base
    crankyoldgit/IRremoteESP8266@^2.8.6

; Esp8266Base configuration
build_flags =
    -DESP8266BASE_LOG_LEVEL=0
    -DESP8266BASE_USE_NTP=1
    -DESP8266BASE_WEB_MAX_APP_PAGES=4
    -DESP8266BASE_WEB_MAX_APP_APIS=6
    -DESP8266BASE_WEB_AUTH_USER=\"admin\"
    -DESP8266BASE_WEB_AUTH_PASS=\"admin123\"

; Partition table: ESP8266 4MB flash, 2MB filesystem
board_build.ldscript = /Users/tyg/dir/claude_dir/Esp8266Base/partitions/esp8266-4mb-2mfs.ld

; Native test environment
[env:native]
platform = native
test_framework = unity
test_build_src = true
lib_deps =
    throwtheswitch/Unity@^2.6.1
build_flags =
    -I test
    -I src
    -DUNIT_TEST
    -DARDUINO=1000
test_ignore = test_desktop
build_src_filter =
    +<app/*.cpp>
    +<fan/*.cpp>
    +<web/*.cpp>
    -<main.cpp>
